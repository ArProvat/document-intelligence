services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document-intelligence-api
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    volumes:
      - chroma_data:/app/chroma_langchain_db
      - bm25_data:/app/bm25_store
      - uploads_data:/app/uploads
      - processed_data:/app/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  chroma_data:
  bm25_data:
  uploads_data:
  processed_data:
